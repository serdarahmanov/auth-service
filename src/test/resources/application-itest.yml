spring:
  datasource:
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true

  mail:
    host: localhost
    port: 1025
    username: test
    password: test

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-client-id
            client-secret: test-client-secret

application:
  base-url: http://localhost:8080
  application-name: Wavy Test
  login-page-url: http://localhost:3000/auth/login
  reset-password-url: http://localhost:8080/api/auth/forgot-password
  frontend-reset-password-url: http://localhost:3000/auth/reset-password
  login-success-url: http://localhost:3000/auth/success

jobrunr:
  background-job-server:
    enabled: false
  dashboard:
    enabled: false

jwt:
  issuer: music-app-backend-itest
  key-id: itest-rsa-key-1
  expiration: 3600000
  refresh-expiration: 1209600000

app:
  s3:
    bucket-name: test-bucket
    region: us-east-1
    access-key: test
    secret-key: test
    base-url: http://localhost:4566/test
    storage-class: STANDARD
